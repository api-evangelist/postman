name: Postman
type: Index
image: https://www.postman.com/assets/logos/postman-logo-horizontal-orange.svg
access: 3rd-Party
description: >-
  Postman is the world's leading API platform, used by 35+ million developers
  to design, build, test, document, mock, monitor, and govern APIs across the
  entire API lifecycle. The platform spans Collections, Workspaces, the API
  Client, Spec Hub, Mock Servers, Monitors, the Postman CLI, Newman, Flows,
  AI Agent Builder, the Postman MCP Server and MCP Generator, API Governance,
  the Private API Network, Live Collections, Insights, and a public Postman
  API Network with millions of public workspaces.
tags:
