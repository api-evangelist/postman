  - aid: postman:collections-api
    name: Postman Collections API
    humanURL: https://learning.postman.com/docs/developer/postman-api/intro-api/
    baseURL: https://api.getpostman.com
    tags:
      - API Management
      - Automation
      - Collections
      - CRUD
    description: >-
      The Collections API lets you programmatically create, read, update, and
      delete Postman Collections including requests, folders, scripts, and
      environments. Powers CI/CD integration, sync, and collection generation
      pipelines.
    properties:
      - url: openapi/postman-collections-api-openapi.yml
        type: OpenAPI
      - url: https://www.postman.com/postman/postman-public-workspace/documentation/i2uqzpp/postman-api
        type: Documentation
  - aid: postman:workspaces-api
    name: Postman Workspaces API
    humanURL: https://learning.postman.com/docs/developer/postman-api/intro-api/
    baseURL: https://api.getpostman.com
    tags:
      - API Management
      - Collaboration
      - Workspaces
    description: >-
      Manage personal, team, partner, public, and private workspaces. Control
      visibility, membership, roles, and the elements (collections,
      environments, mocks, monitors, APIs) attached to each workspace.
    properties:
      - url: openapi/postman-workspaces-api-openapi.yml
        type: OpenAPI
      - url: https://www.postman.com/postman/postman-public-workspace/documentation/i2uqzpp/postman-api
        type: Documentation
  - aid: postman:environments-api
    name: Postman Environments API
    humanURL: https://learning.postman.com/docs/developer/postman-api/intro-api/
    baseURL: https://api.getpostman.com
    tags:
      - Configuration
      - Environments
      - Variables
    description: >-
      The Environments API enables programmatic management of Postman
      environments and global variables, including secret variables stored in
      the Postman Vault, so you can scope work to dev/staging/prod environments.
    properties:
      - url: openapi/postman-environments-api-openapi.yml
        type: OpenAPI
      - url: https://www.postman.com/postman/postman-public-workspace/documentation/i2uqzpp/postman-api
        type: Documentation
  - aid: postman:mock-servers-api
    name: Postman Mock Servers API
    humanURL: https://learning.postman.com/docs/developer/postman-api/intro-api/
    baseURL: https://api.getpostman.com
    tags:
      - API Development
      - Mocking
      - Simulation
      - Sandbox
    description: >-
      The Mock Servers API performs CRUD operations on mock servers, manages
      mock responses, controls visibility, and exposes mock call logs - used
      to simulate API behavior during API-first development and to share
      reference implementations with partners.
    properties:
      - url: openapi/postman-mock-servers-api-openapi.yml
        type: OpenAPI
      - url: https://www.postman.com/postman/postman-public-workspace/documentation/i2uqzpp/postman-api
        type: Documentation
  - aid: postman:monitors-api
    name: Postman Monitors API
    humanURL: https://learning.postman.com/docs/developer/postman-api/intro-api/
    baseURL: https://api.getpostman.com
    tags:
      - Automation
      - Monitoring
      - Scheduling
      - Testing
      - Observability
    description: >-
      The Monitors API runs Postman Collections on a recurring schedule to
      validate API health, performance, and contract conformance. Surfaces
      metrics, test results, and notification webhooks for incident response.
    properties:
      - url: openapi/postman-monitors-api-openapi.yml
        type: OpenAPI
      - url: https://www.postman.com/postman/postman-public-workspace/documentation/i2uqzpp/postman-api
        type: Documentation
  - aid: postman:apis-api
    name: Postman APIs / Spec Hub API
    humanURL: https://learning.postman.com/docs/developer/postman-api/intro-api/
    baseURL: https://api.getpostman.com
    tags:
      - API Builder
      - API Design
      - Spec Hub
      - Specifications
      - OpenAPI
      - GraphQL
    description: >-
      The APIs endpoints (Spec Hub) manage API definitions, versions,
      specifications, and linked elements. Supports OpenAPI 3, AsyncAPI,
      GraphQL, gRPC/Protobuf, RAML, WSDL, and SOAP definitions and enables
      design-first API workflows.
    properties:
      - url: openapi/postman-apis-api-openapi.yml
        type: OpenAPI
      - url: https://www.postman.com/postman/postman-public-workspace/documentation/i2uqzpp/postman-api
        type: Documentation
  - aid: postman:private-api-network-api
    name: Postman Private API Network API
    humanURL: https://learning.postman.com/docs/developer/postman-api/intro-api/
    baseURL: https://api.getpostman.com
    tags:
      - API Catalog
      - API Network
      - Discovery
      - Governance
      - Private Network
    description: >-
      The Private API Network API manages your internal API catalog -
      organizing folders, approving submissions, controlling visibility, and
      integrating CI/CD pipelines that publish APIs into your developer portal.
    properties:
      - url: openapi/postman-private-api-network-api-openapi.yml
        type: OpenAPI
      - url: https://www.postman.com/postman/postman-public-workspace/documentation/i2uqzpp/postman-api
        type: Documentation
  - aid: postman:webhooks-api
    name: Postman Webhooks API
    humanURL: https://learning.postman.com/docs/developer/postman-api/intro-api/
    baseURL: https://api.getpostman.com
    tags:
      - Automation
      - Events
      - Integrations
      - Webhooks
    description: >-
      The Webhooks API creates webhooks that trigger collection runs with
      custom payloads, integrating Postman with external systems (GitHub,
      Slack, custom triggers) for event-driven automation.
    properties:
      - url: openapi/postman-webhooks-api-openapi.yml
        type: OpenAPI
      - url: asyncapi/postman-webhooks-asyncapi.yml
        type: AsyncAPI
      - url: https://www.postman.com/postman/postman-public-workspace/documentation/i2uqzpp/postman-api
        type: Documentation
  - aid: postman:collection-runs-api
    name: Postman Collection Runs API
    humanURL: https://learning.postman.com/docs/developer/postman-api/intro-api/
    baseURL: https://api.getpostman.com
    tags:
      - Automation
      - CI/CD
      - Collection Runner
      - Newman
      - Testing
    description: >-
      The Collection Runs API programmatically launches collection runs,
      retrieves run results, and powers integration with Newman, the Postman
      CLI, and CI/CD pipelines for automated test execution.
    properties:
      - url: openapi/postman-collection-runs-api-openapi.yml
        type: OpenAPI
      - url: https://www.postman.com/postman/postman-public-workspace/documentation/i2uqzpp/postman-api
        type: Documentation
  - aid: postman:tags-api
    name: Postman Tags API
    humanURL: https://learning.postman.com/docs/developer/postman-api/intro-api/
    baseURL: https://api.getpostman.com
    tags:
      - Governance
      - Metadata
      - Organization
      - Discovery
    description: >-
      The Tags API manages tags applied to APIs, collections, and workspaces
      for organization, governance reporting, and discoverability across the
      Private and Public API Networks.
    properties:
      - url: openapi/postman-tags-api-openapi.yml
        type: OpenAPI
      - url: https://www.postman.com/postman/postman-public-workspace/documentation/i2uqzpp/postman-api
        type: Documentation
  - aid: postman:audit-logs-api
    name: Postman Audit Logs API
    humanURL: https://learning.postman.com/docs/developer/postman-api/intro-api/
    baseURL: https://api.getpostman.com
    tags:
      - Audit Logs
      - Compliance
      - Enterprise
      - Governance
      - Security
    description: >-
      Enterprise-only Audit Logs API exposing team audit events (user actions,
      configuration changes, security events) for SIEM ingestion and
      compliance reporting (SOC 2, GDPR, ISO).
    properties:
      - url: openapi/postman-audit-logs-api-openapi.yml
        type: OpenAPI
      - url: https://www.postman.com/postman/postman-public-workspace/documentation/i2uqzpp/postman-api
        type: Documentation
  - aid: postman:secret-scanner-api
    name: Postman Secret Scanner API
    humanURL: https://learning.postman.com/docs/developer/postman-api/intro-api/
    baseURL: https://api.getpostman.com
    tags:
      - Compliance
      - Governance
      - Secret Scanning
      - Security
    description: >-
      The Secret Scanner API manages detected secrets and resolves leaked
      credentials found in collections, environments, and other elements -
      part of Postman's API governance and security posture suite.
    properties:
      - url: openapi/postman-secret-scanner-api-openapi.yml
        type: OpenAPI
      - url: https://www.postman.com/postman/postman-public-workspace/documentation/i2uqzpp/postman-api
        type: Documentation
  - aid: postman:billing-api
    name: Postman Billing API
    humanURL: https://learning.postman.com/docs/developer/postman-api/intro-api/
    baseURL: https://api.getpostman.com
    tags:
      - Billing
      - Enterprise
      - FinOps
      - Resource Usage
    description: >-
      The Billing API exposes account billing information, seat allocation,
      and resource usage so finance and FinOps teams can integrate Postman
      consumption into chargeback / showback reporting.
    properties:
      - url: https://www.postman.com/postman/postman-public-workspace/documentation/i2uqzpp/postman-api
        type: Documentation
  - aid: postman:scim-api
    name: Postman SCIM API
    humanURL: https://learning.postman.com/docs/administration/scim-provisioning/
    baseURL: https://api.getpostman.com/scim/v2
    tags:
      - Enterprise
      - Identity
      - Provisioning
      - SCIM
      - SSO
    description: >-
      The SCIM 2.0 API enables Enterprise customers to provision and
      deprovision users and groups from their identity provider (Okta,
      OneLogin, Azure AD, Ping) into Postman team accounts.
    properties:
      - url: https://www.postman.com/postman/postman-public-workspace/documentation/i2uqzpp/postman-api
        type: Documentation
  - aid: postman:mcp-server
    name: Postman MCP Server
    humanURL: https://github.com/postmanlabs/postman-mcp-server
    tags:
      - AI Agents
      - MCP
      - Model Context Protocol
    description: >-
      The Postman MCP Server exposes Postman Collections, environments, and
      workspaces over Anthropic's Model Context Protocol so AI agents
      (Claude, Cursor, custom LLM clients) can reason over and execute APIs
      directly from your Postman library.
    properties:
      - url: https://github.com/postmanlabs/postman-mcp-server
        type: GitHub
  - aid: postman:flows-api
    name: Postman Flows
    humanURL: https://www.postman.com/product/flows/
    tags:
      - AI
      - Automation
      - Flows
      - Orchestration
      - Workflows
    description: >-
      Postman Flows is a visual workflow builder that chains API calls,
      transformations, and conditional logic. Flows are executable,
      debuggable, and cloneable documentation that powers AI agent
      orchestration and partner integrations.
    properties:
      - url: https://www.postman.com/product/flows/
        type: Documentation
