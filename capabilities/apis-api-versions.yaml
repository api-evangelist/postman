naftiko: 1.0.0-alpha2
info:
  label: Postman APIs API — API Versions
  description: 'Postman APIs API — API Versions. 5 operations. Lead operation: Postman Get all API versions. Self-contained
    Naftiko capability covering one Postman business surface.'
  tags:
  - Postman
  - API Versions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    POSTMAN_API_KEY: POSTMAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: apis-api-versions
    baseUri: https://api.getpostman.com
    description: Postman APIs API — API Versions business capability. Self-contained, no shared references.
    resources:
    - name: apis-apiId-versions
      path: /apis/{apiId}/versions
      operations:
      - name: getapiversions
        method: GET
        description: Postman Get all API versions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cursor
          in: query
          type: string
        - name: limit
          in: query
          type: integer
      - name: createapiversion
        method: POST
        description: Postman Create an API version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: apis-apiId-versions-versionId
      path: /apis/{apiId}/versions/{versionId}
      operations:
      - name: getapiversion
        method: GET
        description: Postman Get an API version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateapiversion
        method: PUT
        description: Postman Update an API version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteapiversion
        method: DELETE
        description: Postman Delete an API version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.POSTMAN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: apis-api-versions-rest
    port: 8080
    description: REST adapter for Postman APIs API — API Versions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/apis/{apiid}/versions
      name: apis-apiid-versions
      description: REST surface for apis-apiId-versions.
      operations:
      - method: GET
        name: getapiversions
        description: Postman Get all API versions
        call: apis-api-versions.getapiversions
        with:
          cursor: rest.cursor
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createapiversion
        description: Postman Create an API version
        call: apis-api-versions.createapiversion
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/apis/{apiid}/versions/{versionid}
      name: apis-apiid-versions-versionid
      description: REST surface for apis-apiId-versions-versionId.
      operations:
      - method: GET
        name: getapiversion
        description: Postman Get an API version
        call: apis-api-versions.getapiversion
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateapiversion
        description: Postman Update an API version
        call: apis-api-versions.updateapiversion
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteapiversion
        description: Postman Delete an API version
        call: apis-api-versions.deleteapiversion
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: apis-api-versions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Postman APIs API — API Versions. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: postman-get-all-api-versions
      description: Postman Get all API versions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: apis-api-versions.getapiversions
      with:
        cursor: tools.cursor
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: postman-create-api-version
      description: Postman Create an API version
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: apis-api-versions.createapiversion
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: postman-get-api-version
      description: Postman Get an API version
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: apis-api-versions.getapiversion
      outputParameters:
      - type: object
        mapping: $.
    - name: postman-update-api-version
      description: Postman Update an API version
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: apis-api-versions.updateapiversion
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: postman-delete-api-version
      description: Postman Delete an API version
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: apis-api-versions.deleteapiversion
      outputParameters:
      - type: object
        mapping: $.
