naftiko: 1.0.0-alpha2
info:
  label: Postman Environments API — Environments
  description: 'Postman Environments API — Environments. 5 operations. Lead operation: Postman Get all environments. Self-contained
    Naftiko capability covering one Postman business surface.'
  tags:
  - Postman
  - Environments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    POSTMAN_API_KEY: POSTMAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: environments-environments
    baseUri: https://api.getpostman.com
    description: Postman Environments API — Environments business capability. Self-contained, no shared references.
    resources:
    - name: environments
      path: /environments
      operations:
      - name: getallenvironments
        method: GET
        description: Postman Get all environments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspace
          in: query
          type: string
          description: Filter environments by workspace ID.
      - name: createenvironment
        method: POST
        description: Postman Create an environment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspace
          in: query
          type: string
          description: The workspace ID to create the environment in.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: environments-environmentId
      path: /environments/{environmentId}
      operations:
      - name: getenvironment
        method: GET
        description: Postman Get an environment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateenvironment
        method: PUT
        description: Postman Update an environment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteenvironment
        method: DELETE
        description: Postman Delete an environment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.POSTMAN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: environments-environments-rest
    port: 8080
    description: REST adapter for Postman Environments API — Environments. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/environments
      name: environments
      description: REST surface for environments.
      operations:
      - method: GET
        name: getallenvironments
        description: Postman Get all environments
        call: environments-environments.getallenvironments
        with:
          workspace: rest.workspace
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createenvironment
        description: Postman Create an environment
        call: environments-environments.createenvironment
        with:
          workspace: rest.workspace
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/environments/{environmentid}
      name: environments-environmentid
      description: REST surface for environments-environmentId.
      operations:
      - method: GET
        name: getenvironment
        description: Postman Get an environment
        call: environments-environments.getenvironment
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateenvironment
        description: Postman Update an environment
        call: environments-environments.updateenvironment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteenvironment
        description: Postman Delete an environment
        call: environments-environments.deleteenvironment
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: environments-environments-mcp
    port: 9090
    transport: http
    description: MCP adapter for Postman Environments API — Environments. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: postman-get-all-environments
      description: Postman Get all environments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: environments-environments.getallenvironments
      with:
        workspace: tools.workspace
      outputParameters:
      - type: object
        mapping: $.
    - name: postman-create-environment
      description: Postman Create an environment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: environments-environments.createenvironment
      with:
        workspace: tools.workspace
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: postman-get-environment
      description: Postman Get an environment
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: environments-environments.getenvironment
      outputParameters:
      - type: object
        mapping: $.
    - name: postman-update-environment
      description: Postman Update an environment
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: environments-environments.updateenvironment
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: postman-delete-environment
      description: Postman Delete an environment
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: environments-environments.deleteenvironment
      outputParameters:
      - type: object
        mapping: $.
