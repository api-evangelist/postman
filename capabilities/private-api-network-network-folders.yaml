naftiko: 1.0.0-alpha2
info:
  label: Postman Private API Network API — Network Folders
  description: 'Postman Private API Network API — Network Folders. 4 operations. Lead operation: Postman Get all network folders.
    Self-contained Naftiko capability covering one Postman business surface.'
  tags:
  - Postman
  - Network Folders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    POSTMAN_API_KEY: POSTMAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: private-api-network-network-folders
    baseUri: https://api.getpostman.com
    description: Postman Private API Network API — Network Folders business capability. Self-contained, no shared references.
    resources:
    - name: network-private-network-folder
      path: /network/private/network-folder
      operations:
      - name: getnetworkfolders
        method: GET
        description: Postman Get all network folders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offset
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
        - name: parentFolderId
          in: query
          type: integer
        - name: sort
          in: query
          type: string
        - name: direction
          in: query
          type: string
      - name: createnetworkfolder
        method: POST
        description: Postman Create a network folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: network-private-network-folder-folderId
      path: /network/private/network-folder/{folderId}
      operations:
      - name: updatenetworkfolder
        method: PUT
        description: Postman Update a network folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: folderId
          in: path
          type: integer
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletenetworkfolder
        method: DELETE
        description: Postman Delete a network folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: folderId
          in: path
          type: integer
          required: true
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.POSTMAN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: private-api-network-network-folders-rest
    port: 8080
    description: REST adapter for Postman Private API Network API — Network Folders. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/network/private/network-folder
      name: network-private-network-folder
      description: REST surface for network-private-network-folder.
      operations:
      - method: GET
        name: getnetworkfolders
        description: Postman Get all network folders
        call: private-api-network-network-folders.getnetworkfolders
        with:
          offset: rest.offset
          limit: rest.limit
          parentFolderId: rest.parentFolderId
          sort: rest.sort
          direction: rest.direction
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createnetworkfolder
        description: Postman Create a network folder
        call: private-api-network-network-folders.createnetworkfolder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/network/private/network-folder/{folderid}
      name: network-private-network-folder-folderid
      description: REST surface for network-private-network-folder-folderId.
      operations:
      - method: PUT
        name: updatenetworkfolder
        description: Postman Update a network folder
        call: private-api-network-network-folders.updatenetworkfolder
        with:
          folderId: rest.folderId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletenetworkfolder
        description: Postman Delete a network folder
        call: private-api-network-network-folders.deletenetworkfolder
        with:
          folderId: rest.folderId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: private-api-network-network-folders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Postman Private API Network API — Network Folders. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: postman-get-all-network-folders
      description: Postman Get all network folders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: private-api-network-network-folders.getnetworkfolders
      with:
        offset: tools.offset
        limit: tools.limit
        parentFolderId: tools.parentFolderId
        sort: tools.sort
        direction: tools.direction
      outputParameters:
      - type: object
        mapping: $.
    - name: postman-create-network-folder
      description: Postman Create a network folder
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: private-api-network-network-folders.createnetworkfolder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: postman-update-network-folder
      description: Postman Update a network folder
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: private-api-network-network-folders.updatenetworkfolder
      with:
        folderId: tools.folderId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: postman-delete-network-folder
      description: Postman Delete a network folder
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: private-api-network-network-folders.deletenetworkfolder
      with:
        folderId: tools.folderId
      outputParameters:
      - type: object
        mapping: $.
