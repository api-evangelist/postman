naftiko: "1.0.0-alpha2"

info:
  title: Postman MCP Server Bridge
  description: >-
    Wraps Postman's first-party MCP Server (open-source, exposes Postman
    Collections + environments + workspaces as MCP tools) as a Naftiko
    consume so any Naftiko capability can reach the Postman tool surface
    and re-expose it as a governed Naftiko-built MCP — Postman becomes
    a Naftiko-consumable surface like any other.
  tags:
    - Naftiko
    - Postman
    - Partnership
    - MCP
    - Tool-Bridge
    - Re-expose
  created: '2026-05-15'
  modified: '2026-05-15'

binds:
  - namespace: postman-env
    description: Postman API key + MCP server endpoint.
    keys:
      POSTMAN_API_KEY: POSTMAN_API_KEY
      POSTMAN_MCP_BASE: POSTMAN_MCP_BASE

capability:
  consumes:
    - namespace: postman-mcp
      type: http
      baseUri: '{{POSTMAN_MCP_BASE}}'
      authentication:
        type: bearer
        token: '{{POSTMAN_API_KEY}}'
      resources:
        - name: list-mcp-tools
          path: '/mcp/tools'
          operations:
            - name: list-mcp-tools
              method: GET
        - name: invoke-mcp-tool
          path: '/mcp/tools/{{tool_name}}/invoke'
          operations:
            - name: invoke-mcp-tool
              method: POST
              inputParameters:
                - { name: tool_name, in: path, required: true }
        - name: list-mcp-resources
          path: '/mcp/resources'
          operations:
            - name: list-mcp-resources
              method: GET
        - name: get-mcp-resource
          path: '/mcp/resources/{{resource_uri}}'
          operations:
            - name: get-mcp-resource
              method: GET
              inputParameters:
                - { name: resource_uri, in: path, required: true }

  exposes:
    - type: rest
      address: 0.0.0.0
      port: 8080
      namespace: postman-mcp-server-bridge-rest
      description: REST surface for the Postman MCP Server, wrapped for Naftiko consumption.
      resources:
        - name: list-mcp-tools
          path: '/mcp/tools'
          operations:
            - name: list-mcp-tools
              method: GET
              call: postman-mcp.list-mcp-tools
        - name: invoke-mcp-tool
          path: '/mcp/tools/{tool_name}/invoke'
          operations:
            - name: invoke-mcp-tool
              method: POST
              inputParameters:
                - { name: tool_name, in: path, type: string, required: true }
              call: postman-mcp.invoke-mcp-tool
        - name: list-mcp-resources
          path: '/mcp/resources'
          operations:
            - name: list-mcp-resources
              method: GET
              call: postman-mcp.list-mcp-resources
        - name: get-mcp-resource
          path: '/mcp/resources/{resource_uri}'
          operations:
            - name: get-mcp-resource
              method: GET
              inputParameters:
                - { name: resource_uri, in: path, type: string, required: true }
              call: postman-mcp.get-mcp-resource

    - type: mcp
      address: 0.0.0.0
      port: 3010
      namespace: postman-mcp-server-bridge-mcp
      description: MCP server re-exposing Postman MCP tools as Naftiko-governed MCP tools.
      tools:
        - name: list-mcp-tools
          description: List the MCP tools exposed by Postman's first-party MCP Server.
          hints: { readOnly: true }
          call: postman-mcp.list-mcp-tools
        - name: invoke-mcp-tool
          description: Invoke a Postman MCP tool by name (governed pass-through).
          hints: { destructiveHint: true }
          inputParameters:
            - { name: tool_name, type: string, required: true, description: Postman MCP tool name. }
          call: postman-mcp.invoke-mcp-tool
        - name: list-mcp-resources
          description: List resources exposed by the Postman MCP Server.
          hints: { readOnly: true }
          call: postman-mcp.list-mcp-resources
        - name: get-mcp-resource
          description: Fetch a Postman MCP resource by URI.
          hints: { readOnly: true }
          inputParameters:
            - { name: resource_uri, type: string, required: true, description: Postman MCP resource URI. }
          call: postman-mcp.get-mcp-resource
