naftiko: 1.0.0-alpha2
info:
  label: Postman Monitors API — Monitors
  description: 'Postman Monitors API — Monitors. 6 operations. Lead operation: Postman Get all monitors. Self-contained Naftiko
    capability covering one Postman business surface.'
  tags:
  - Postman
  - Monitors
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    POSTMAN_API_KEY: POSTMAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: monitors-monitors
    baseUri: https://api.getpostman.com
    description: Postman Monitors API — Monitors business capability. Self-contained, no shared references.
    resources:
    - name: monitors
      path: /monitors
      operations:
      - name: getallmonitors
        method: GET
        description: Postman Get all monitors
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspace
          in: query
          type: string
          description: Filter monitors by workspace ID.
      - name: createmonitor
        method: POST
        description: Postman Create a monitor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspace
          in: query
          type: string
          description: The workspace ID to create the monitor in.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: monitors-monitorId
      path: /monitors/{monitorId}
      operations:
      - name: getmonitor
        method: GET
        description: Postman Get a monitor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatemonitor
        method: PUT
        description: Postman Update a monitor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletemonitor
        method: DELETE
        description: Postman Delete a monitor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: monitors-monitorId-run
      path: /monitors/{monitorId}/run
      operations:
      - name: runmonitor
        method: POST
        description: Postman Run a monitor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.POSTMAN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: monitors-monitors-rest
    port: 8080
    description: REST adapter for Postman Monitors API — Monitors. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/monitors
      name: monitors
      description: REST surface for monitors.
      operations:
      - method: GET
        name: getallmonitors
        description: Postman Get all monitors
        call: monitors-monitors.getallmonitors
        with:
          workspace: rest.workspace
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createmonitor
        description: Postman Create a monitor
        call: monitors-monitors.createmonitor
        with:
          workspace: rest.workspace
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/monitors/{monitorid}
      name: monitors-monitorid
      description: REST surface for monitors-monitorId.
      operations:
      - method: GET
        name: getmonitor
        description: Postman Get a monitor
        call: monitors-monitors.getmonitor
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatemonitor
        description: Postman Update a monitor
        call: monitors-monitors.updatemonitor
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletemonitor
        description: Postman Delete a monitor
        call: monitors-monitors.deletemonitor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/monitors/{monitorid}/run
      name: monitors-monitorid-run
      description: REST surface for monitors-monitorId-run.
      operations:
      - method: POST
        name: runmonitor
        description: Postman Run a monitor
        call: monitors-monitors.runmonitor
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: monitors-monitors-mcp
    port: 9090
    transport: http
    description: MCP adapter for Postman Monitors API — Monitors. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: postman-get-all-monitors
      description: Postman Get all monitors
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: monitors-monitors.getallmonitors
      with:
        workspace: tools.workspace
      outputParameters:
      - type: object
        mapping: $.
    - name: postman-create-monitor
      description: Postman Create a monitor
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: monitors-monitors.createmonitor
      with:
        workspace: tools.workspace
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: postman-get-monitor
      description: Postman Get a monitor
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: monitors-monitors.getmonitor
      outputParameters:
      - type: object
        mapping: $.
    - name: postman-update-monitor
      description: Postman Update a monitor
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: monitors-monitors.updatemonitor
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: postman-delete-monitor
      description: Postman Delete a monitor
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: monitors-monitors.deletemonitor
      outputParameters:
      - type: object
        mapping: $.
    - name: postman-run-monitor
      description: Postman Run a monitor
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: monitors-monitors.runmonitor
      outputParameters:
      - type: object
        mapping: $.
