naftiko: 1.0.0-alpha2
info:
  label: Scan Postman-detected secrets with Snyk and open a fix issue
  description: When the Postman secret scanner finds a leaked secret, open a Snyk issue and resolve the detected secret in Postman once Snyk confirms remediation.
  tags:
  - Postman
  - Integration
  - Security
  - snyk
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    POSTMAN_API_KEY: POSTMAN_API_KEY
    SNYK_API_KEY: SNYK_API_KEY
capability:
  consumes:
  - type: http
    namespace: postman
    baseUri: https://api.getpostman.com
    description: Postman API operations consumed by this integration.
    resources:
    - name: secret-scanner-detected-secrets
      path: /secret-scanner/detected-secrets
      operations:
      - name: getdetectedsecrets
        method: GET
        description: List Postman-detected secrets to triage with Snyk.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: secret-scanner-detected-secrets-secretid
      path: /secret-scanner/detected-secrets/{secretId}
      operations:
      - name: resolvedetectedsecret
        method: PUT
        description: Mark the Postman-detected secret as resolved once Snyk confirms remediation.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: secretId
          in: path
          type: string
          description: Path parameter secretId.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: snyk
    baseUri: https://api.snyk.io
    description: Snyk REST API operations consumed by this integration.
    resources:
    - name: rest-orgs-org-id-issues
      path: /rest/orgs/{org_id}/issues
      operations:
      - name: createissue
        method: POST
        description: 'Snyk REST API: createIssue'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Path parameter org_id.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: postman-snyk-mcp
    description: MCP adapter for the postman-snyk integration.
    tools:
    - name: postman_snyk
      description: Execute the postman snyk integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: postman-snyk-rest
    port: 8080
    description: REST adapter for the postman-snyk integration.
    resources:
    - path: /postman-snyk
      name: postman-snyk
      description: REST surface for the postman-snyk integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the postman-snyk integration.
        call: postman_snyk
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
