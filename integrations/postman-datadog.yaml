naftiko: 1.0.0-alpha2
info:
  label: Forward Postman monitor results to Datadog metrics
  description: Translate each Postman monitor run into Datadog custom metrics and events so API health rolls up next to the rest of the platform's SLOs.
  tags:
  - Postman
  - Integration
  - Observability
  - datadog
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    POSTMAN_API_KEY: POSTMAN_API_KEY
    DATADOG_API_KEY: DATADOG_API_KEY
capability:
  consumes:
  - type: http
    namespace: postman
    baseUri: https://api.getpostman.com
    description: Postman API operations consumed by this integration.
    resources:
    - name: monitors
      path: /monitors
      operations:
      - name: getallmonitors
        method: GET
        description: List all Postman monitors to seed Datadog dashboards.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: monitors-monitorid-run
      path: /monitors/{monitorId}/run
      operations:
      - name: runmonitor
        method: POST
        description: Trigger a monitor run from a Datadog synthetic schedule.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: monitorId
          in: path
          type: string
          description: Path parameter monitorId.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: datadog
    baseUri: https://api.datadoghq.com
    description: Datadog API operations consumed by this integration.
    resources:
    - name: api-v2-series
      path: /api/v2/series
      operations:
      - name: submitmetrics
        method: POST
        description: 'Datadog API: submitMetrics'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v1-events
      path: /api/v1/events
      operations:
      - name: postevent
        method: POST
        description: 'Datadog API: postEvent'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: postman-datadog-mcp
    description: MCP adapter for the postman-datadog integration.
    tools:
    - name: postman_datadog
      description: Execute the postman datadog integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: postman-datadog-rest
    port: 8080
    description: REST adapter for the postman-datadog integration.
    resources:
    - path: /postman-datadog
      name: postman-datadog
      description: REST surface for the postman-datadog integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the postman-datadog integration.
        call: postman_datadog
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
