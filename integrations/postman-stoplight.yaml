naftiko: 1.0.0-alpha2
info:
  label: Cross-publish Postman collections to Stoplight projects
  description: Mirror Postman API schemas into a Stoplight project so design-time docs and runtime collections stay in lockstep.
  tags:
  - Postman
  - Integration
  - Governance
  - stoplight
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    POSTMAN_API_KEY: POSTMAN_API_KEY
    STOPLIGHT_API_KEY: STOPLIGHT_API_KEY
capability:
  consumes:
  - type: http
    namespace: postman
    baseUri: https://api.getpostman.com
    description: Postman API operations consumed by this integration.
    resources:
    - name: apis-apiid
      path: /apis/{apiId}
      operations:
      - name: getapi
        method: GET
        description: Read the Postman API record to mirror into Stoplight.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: apiId
          in: path
          type: string
          description: Path parameter apiId.
          required: true
    - name: apis-apiid-schemas-schemaid
      path: /apis/{apiId}/schemas/{schemaId}
      operations:
      - name: getapischema
        method: GET
        description: Read the Postman OpenAPI schema to upsert in Stoplight.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: apiId
          in: path
          type: string
          description: Path parameter apiId.
          required: true
        - name: schemaId
          in: path
          type: string
          description: Path parameter schemaId.
          required: true
  - type: http
    namespace: stoplight
    baseUri: https://stoplight.io/api
    description: Stoplight Platform API operations consumed by this integration.
    resources:
    - name: v1-projects-project-id-nodes
      path: /v1/projects/{project_id}/nodes
      operations:
      - name: upsertnode
        method: POST
        description: 'Stoplight Platform API: upsertNode'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: project_id
          in: path
          type: string
          description: Path parameter project_id.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: postman-stoplight-mcp
    description: MCP adapter for the postman-stoplight integration.
    tools:
    - name: postman_stoplight
      description: Execute the postman stoplight integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: postman-stoplight-rest
    port: 8080
    description: REST adapter for the postman-stoplight integration.
    resources:
    - path: /postman-stoplight
      name: postman-stoplight
      description: REST surface for the postman-stoplight integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the postman-stoplight integration.
        call: postman_stoplight
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
