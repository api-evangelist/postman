specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Postman
providerId: postman
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - API Development
  - Collaboration
  - Rate Limiting
description: >-
  The Postman public API enforces a fixed per-minute request ceiling per API
  key (300 requests/minute) layered over per-plan monthly quotas (10k Free,
  100k Solo, 1M Team, 10M Enterprise). Rate-limit state is exposed on every
  response via standard RateLimit and X-RateLimit headers; throttled responses
  return 429 with a RetryAfter hint. Monthly call budgets are enforced
  separately and consumption is observable from the resource-usage dashboard.
sources:
  - https://learning.postman.com/docs/developer/postman-api/postman-api-rate-limits/
  - https://www.postman.com/pricing/
headers:
  limit: RateLimit-Limit
  remaining: RateLimit-Remaining
  reset: RateLimit-Reset
  policy: RateLimit-Policy
  retryAfter: RetryAfter
  monthlyLimit: X-RateLimit-Limit
  monthlyRemaining: X-RateLimit-Remaining
responseCodes:
  throttled: 429
  quotaExceeded: 429
limits:
  - name: Per-key request rate
    scope: api-key
    metric: requests_per_minute
    limit: 300
    timeFrame: minute
    notes: Fixed 60-second window per RateLimit-Policy header (300;w=60).
  - name: Free plan monthly Postman API calls
    scope: account
    metric: requests_per_month
    limit: 10000
    timeFrame: month
  - name: Solo plan monthly Postman API calls
    scope: account
    metric: requests_per_month
    limit: 100000
    timeFrame: month
  - name: Team plan monthly Postman API calls
    scope: account
    metric: requests_per_month
    limit: 1000000
    timeFrame: month
  - name: Enterprise plan monthly Postman API calls
    scope: account
    metric: requests_per_month
    limit: 10000000
    timeFrame: month
  - name: API monitoring requests
    scope: account
    metric: monitoring_requests_per_month
    limit: 1000
    timeFrame: month
    notes: 1k on Free; 10k on Solo, Team, and Enterprise.
policies:
  - name: Backoff on RetryAfter
    description: When a 429 is returned, clients must honor the RetryAfter header (seconds until next allowed request).
  - name: Header-driven pacing
    description: Clients should pace requests using RateLimit-Remaining and RateLimit-Reset rather than fixed sleeps.
  - name: Monthly quota separation
    description: Per-minute throttling and monthly Postman-API-call quotas are enforced independently; exceeding the monthly quota also returns 429.
  - name: Usage observability
    description: Total and remaining monthly quota are visible on every response and on the Postman resource-usage dashboard.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
