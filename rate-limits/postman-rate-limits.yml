specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Postman
providerId: postman
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - AI Agent Builder
  - API Development
  - API Documentation
  - API Governance
  - API Monitoring
  - API Testing
  - Automation
  - Client
  - Clients
  - Collaboration
  - Collections
  - Discovery
  - Environments
  - MCP
  - Mock Servers
  - Mocking
  - Network
  - Platform
  - Testing
  - Workflows
  - Workspaces
  - Rate Limiting
  - Quotas
  - Throttling
description: Machine-readable rate limit definitions for the Postman API surface. Captures per-tier quotas,
  burst behavior, response signaling, and recovery semantics. Defaults are scaffold values to be replaced
  with published provider limits.
headers:
  limit: X-RateLimit-Limit
  remaining: X-RateLimit-Remaining
  reset: X-RateLimit-Reset
  retryAfter: Retry-After
  policy: RateLimit-Policy
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - tier: free
    name: Free Tier Default
    scope: api-key
    metric: requests_per_minute
    limit: 10
    burst: 20
    timeFrame: minute
    applies:
      - Postman
      - Postman Collections API
      - Postman Workspaces API
      - Postman Environments API
      - Postman Mock Servers API
      - Postman Monitors API
      - Postman APIs API
      - Postman Private API Network API
      - Postman Webhooks API
      - Postman Collection Runs API
      - Postman Tags API
      - Postman Audit Logs API
      - Postman Secret Scanner API
  - tier: free
    name: Free Tier Monthly Quota
    scope: api-key
    metric: requests_per_month
    limit: 1000
    timeFrame: month
    applies:
      - Postman
      - Postman Collections API
      - Postman Workspaces API
      - Postman Environments API
      - Postman Mock Servers API
      - Postman Monitors API
      - Postman APIs API
      - Postman Private API Network API
      - Postman Webhooks API
      - Postman Collection Runs API
      - Postman Tags API
      - Postman Audit Logs API
      - Postman Secret Scanner API
  - tier: professional
    name: Professional Tier Default
    scope: api-key
    metric: requests_per_minute
    limit: 100
    burst: 200
    timeFrame: minute
    applies:
      - Postman
      - Postman Collections API
      - Postman Workspaces API
      - Postman Environments API
      - Postman Mock Servers API
      - Postman Monitors API
      - Postman APIs API
      - Postman Private API Network API
      - Postman Webhooks API
      - Postman Collection Runs API
      - Postman Tags API
      - Postman Audit Logs API
      - Postman Secret Scanner API
  - tier: professional
    name: Professional Tier Monthly Quota
    scope: api-key
    metric: requests_per_month
    limit: 100000
    timeFrame: month
    applies:
      - Postman
      - Postman Collections API
      - Postman Workspaces API
      - Postman Environments API
      - Postman Mock Servers API
      - Postman Monitors API
      - Postman APIs API
      - Postman Private API Network API
      - Postman Webhooks API
      - Postman Collection Runs API
      - Postman Tags API
      - Postman Audit Logs API
      - Postman Secret Scanner API
  - tier: enterprise
    name: Enterprise Negotiated Limit
    scope: contract
    metric: requests_per_minute
    limit: 1000
    burst: 5000
    timeFrame: minute
    applies:
      - Postman
      - Postman Collections API
      - Postman Workspaces API
      - Postman Environments API
      - Postman Mock Servers API
      - Postman Monitors API
      - Postman APIs API
      - Postman Private API Network API
      - Postman Webhooks API
      - Postman Collection Runs API
      - Postman Tags API
      - Postman Audit Logs API
      - Postman Secret Scanner API
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter, honoring the Retry-After header
      when present.
  - name: Burst Handling
    description: Short bursts above the steady-state limit are tolerated up to the documented burst ceiling
      before throttling engages.
  - name: Quota Reset
    description: Monthly quotas reset at the start of each calendar month in UTC. Per-minute and per-second
      windows reset on a sliding-window basis.
  - name: Fair Use
    description: Even on uncapped enterprise tiers, sustained usage that materially impacts shared infrastructure
      may be subject to fair-use throttling.
