specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Postman
providerId: postman
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - API Development
  - Collaboration
  - FinOps
  - FOCUS
description: >-
  FOCUS-aligned FinOps for Postman: per-seat tiered subscription (Solo $9,
  Team $19, Enterprise $49 per user/month, billed annually) layered with
  metered consumption surfaces (AI credits, automation flow credits,
  monitoring requests, Postman API calls). Add-ons (custom domains, private
  NPM, data-driven testing) appear as separate Purchase line items.
sources:
  - https://www.postman.com/pricing/
  - https://learning.postman.com/docs/developer/postman-api/postman-api-rate-limits/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Postman, Inc.
serviceCategory: Developer Tools
billingModel:
  pricingCategory: Tiered Subscription + Usage
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Postman
  ServiceCategory: Developer Tools
  ServiceSubcategory: API Platform
  ProviderName: Postman
  PublisherName: Postman, Inc.
  InvoiceIssuerName: Postman, Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingUnit: seat-month
meters:
  - name: seats
    description: Per-user subscription seats on Solo, Team, and Enterprise.
    unit: seat-month
    aggregation: max
    dimensions:
      - plan
      - team
  - name: ai_credits
    description: AI credits consumed by Postbot and AI features.
    unit: credit
    aggregation: sum
    dimensions:
      - user
      - workspace
      - feature
  - name: automation_flow_credits
    description: Automation Flow runs charged in credits, pooled per team on Team and Enterprise.
    unit: credit
    aggregation: sum
    dimensions:
      - workspace
      - flow
  - name: monitoring_requests
    description: Outbound API monitor invocations.
    unit: request
    aggregation: sum
    dimensions:
      - monitor
      - workspace
      - region
  - name: postman_api_calls
    description: Calls against the Postman REST API authenticated with a Postman API key.
    unit: request
    aggregation: sum
    dimensions:
      - api_key
      - endpoint
  - name: integrations
    description: Configured third-party integrations against the per-plan ceiling.
    unit: integration
    aggregation: max
    dimensions:
      - workspace
  - name: addons
    description: Optional purchases (custom domains, private NPM packages, data-driven testing).
    unit: addon
    aggregation: count
    dimensions:
      - addon_type
      - workspace
principles:
  - name: Visibility
    description: Use the Postman resource-usage dashboard and the Postman API (which exposes RateLimit and monthly X-RateLimit headers on every response) to observe seat and consumption-meter consumption.
  - name: Allocation
    description: Allocate by workspace and team; pooled meters (Enterprise AI credits, Team automation credits) should be tagged at the workspace level for chargeback.
  - name: Optimization
    description: Right-size plan selection on per-user pricing breakpoints ($9 Solo, $19 Team, $49 Enterprise); cap AI-credit consumption per user; consolidate monitors to share the 10k/month monitoring quota.
  - name: Accountability
    description: Workspace owners are accountable for their AI credits, monitoring requests, and integration counts; admins should set alerts before the per-plan ceilings are reached and renegotiate seat counts at renewal.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
