specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Postman
providerId: postman
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - API Development
  - Collaboration
  - Mocking
  - Monitoring
  - Testing
description: >-
  Postman publishes a four-tier per-seat subscription with metered overlays
  for AI credits, monitoring requests, automation flow credits, integrations,
  and Postman API calls. Free is single-user; Solo and Team are billed
  annually per user; Enterprise is the highest per-seat tier with pooled AI
  credits, advanced RBAC, audit logs, private runners, and the API catalog.
sources:
  - https://www.postman.com/pricing/
  - https://learning.postman.com/docs/developer/postman-api/postman-api-rate-limits/
plans:
  - id: postman-free
    name: Free
    type: freemium
    description: Single-user starter plan for evaluating Postman.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: seat
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: AI Credits
        name: ai_credits
        type: quota
        metric: credit
        limit: 50
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: API Monitoring Requests
